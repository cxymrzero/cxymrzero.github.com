---
layout: default
title: clean code
---
<div class="blog-index">
  {% for post in site.posts %}
    <article>
      <header>
        <h1 class="entry-title"><a href="{{ post.url }}">{{ post.title }}</a></h1>
        <p class="meta">
          <time class='entry-date' datetime='{{ post.date | date_to_xmlschema }}'>
            <span class='date'>
              <span class='date-month'>{{ post.date | date: '%b' }}</span>
              <span class='date-day'>{{ post.date | date: '%d' }}</span><span class='date-suffix'>th</span>,
              <span class='date-year'>{{ post.date | date: '%Y' }}</span>
            </span>
            <span class='time'>{{ post.date | date: '%-I:%M %P' }}</span>
          </time>
          | <a href="{{ post.url }}#disqus_thread" data-disqus-identifier="{{ site.url }}{{ post.url }}">Comments</a>
        </p>
      </header>

      <div class="entry-content">
        {{ post.excerpt }}
      </div>

      <footer>
        <a rel="full-article" href="{{ post.url }}">阅读全文</a>
      </footer>
    </article>
  {% endfor %}
</div>
