<p>最近经常需要处理时间，一直在用这两个函数：</p>

<h3><a href="http://php.net/manual/zh/function.date.php">date()</a></h3>

<p><code>date()</code>可以将时间戳格式化成字符串，最常用的就是<code>YYYY-mm-dd HH:ii:ss</code>这种格式了。可以不加<code>$timestamp</code>参数，默认是当前时间。</p>
